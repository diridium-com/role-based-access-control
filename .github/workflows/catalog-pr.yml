#
# OPTIONAL: files a version-manifest PR to an OIE community catalog when a
# release is PUBLISHED (release.yml only stages a draft; a human publishes it
# after checking the assets — that publish event triggers this workflow, and
# only then is the asset publicly downloadable for digesting). Inert unless
# the repository is configured for it:
#
#   * Actions variable CATALOG_REPO  — the catalog repository (owner/name)
#   * Actions secret  CATALOG_TOKEN — fine-grained PAT scoped to that catalog
#     repository with Contents + Pull requests read/write
#
# workflow_dispatch with a tag input backfills an already-published release.

name: Catalog PR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Published release tag to file (e.g. v1.1.3) — for backfilling"
        required: true

jobs:
  catalog-manifest:
    if: vars.CATALOG_REPO != ''
    runs-on: ubuntu-latest
    env:
      CATALOG_REPO: ${{ vars.CATALOG_REPO }}
      PLUGIN_ID: rbac
      GH_TOKEN: ${{ secrets.CATALOG_TOKEN }}
    steps:
      - name: Require the catalog token
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::CATALOG_REPO is set but the CATALOG_TOKEN secret is not — cannot open the catalog PR."
            exit 1
          fi

      - name: Resolve tag, download and digest the release asset
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="${TAG#v}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # Public asset URL, no auth: the CATALOG_TOKEN is scoped to the catalog
          # repo and must not be relied on for reads here. The release is
          # published (not draft) when this runs, so the URL resolves.
          curl -fL --retry 5 --retry-delay 5 -o asset.zip \
            "https://github.com/${{ github.repository }}/releases/download/${TAG}/${PLUGIN_ID}-${VERSION}.zip"
          echo "SHA256=$(sha256sum asset.zip | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Read manifest fields from the tagged oie.json
        run: |
          curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/$TAG/oie.json" -o oie.json
          echo "MIN_ENGINE=$(node -p "JSON.parse(require('fs').readFileSync('oie.json','utf8')).minEngineVersion")" >> "$GITHUB_ENV"
          echo "STORE_DOCS=$(node -p "JSON.parse(require('fs').readFileSync('oie.json','utf8')).storeDocs || 'README.md'")" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.CATALOG_REPO }}
          token: ${{ secrets.CATALOG_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write the version manifest
        run: |
          mkdir -p "manifests/plugins/${PLUGIN_ID}"
          cat > "manifests/plugins/${PLUGIN_ID}/${VERSION}.json" <<EOF
          {
              "version": "${VERSION}",
              "ui": ["web", "swing"],
              "minEngineVersion": "${MIN_ENGINE}",
              "maxEngineVersion": null,
              "installerUrl": "https://github.com/${{ github.repository }}/releases/download/${TAG}/${PLUGIN_ID}-${VERSION}.zip",
              "sha256": "${SHA256}",
              "restartRequired": true,
              "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "releaseNotesUrl": "https://github.com/${{ github.repository }}/releases/tag/${TAG}",
              "docsUrl": "https://raw.githubusercontent.com/${{ github.repository }}/${TAG}/${STORE_DOCS}"
          }
          EOF

      - name: Validate (schema + digest download)
        run: node scripts/build-index.mjs --lint --verify "manifests/plugins/${PLUGIN_ID}/${VERSION}.json"

      - name: Open the catalog PR
        run: |
          BRANCH="${PLUGIN_ID}-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add manifests
          git commit -m "${PLUGIN_ID} ${VERSION}"
          git push -f origin "$BRANCH"
          if gh pr list -R "$CATALOG_REPO" --head "$BRANCH" --json number -q '.[0].number' | grep -q .; then
            echo "PR already open for $BRANCH — branch updated."
          else
            gh pr create -R "$CATALOG_REPO" --head "$BRANCH" \
              --title "${PLUGIN_ID} ${VERSION}" \
              --body "Automated manifest for [${PLUGIN_ID} ${TAG}](https://github.com/${{ github.repository }}/releases/tag/${TAG}). Digest computed from the release asset by this workflow and verified again by catalog CI."
          fi
